<style>

  html, body {

    white-space: nowrap;
  }

  #terminal {
    flex: 1;
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #history {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 0;
    font-size: 14px;
    line-height: 1.55;

    display: flex;
    align-items: center;
    padding: 0 14px 10px;
    font-size: 14px;
    color: #d4d4d4;
    flex-shrink: 0;

  #ps1-live {
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #d4d4d4;
    font-family: 'Courier New', Courier, monospace;

function codeFromSeed(seed) {
  const key = String(seed);
  if (SEED_TABLE[key]) return SEED_TABLE[key];
  // fallback for seeds outside table
  let h = seed ^ 0xdeadbeef;
  const rng = () => { h = (Math.imul(h^(h>>>16),0x45d9f3b)|0); h = (Math.imul(h^(h>>>16),0x45d9f3b)|0); return ((h^(h>>>16))>>>0)/4294967296; };
  let code="", g=0;
  while(code.length<4&&g++<10000){ const d=Math.floor(rng()*10); if(!code.includes(String(d))) code+=d; }
  return code;
}

const S={phase:"BOOT",secret:"",guessesLeft:0,maxGuesses:0};
const hist=document.getElementById("history");
const input=document.getElementById("user-input");

function println(text){
  const el=document.createElement("span");
  el.className="row";
  el.textContent=(text===undefined?"":text);
  hist.appendChild(el);
  hist.scrollTop=hist.scrollHeight;
}

function blank(){println("");}

function printPromptLine(cmd){
  const row=document.createElement("span");
  row.className="row";
  const parts=[["ps1-user","afbeltranp"],["ps1-at","@"],["ps1-host","ubuntu"],["ps1-colon",":"],["ps1-path","~/intro-programacion"],["ps1-dollar","$ "],["ps1-cmd",cmd]];

  hist.scrollTop=hist.scrollHeight;
}

function welcome(){println("Welcome to Bulls and Cows!");blank();showCodeMenu();}
function showCodeMenu(){S.phase="MENU";println("Type '1' if you would like the computer to generate a secret code or '2' if you want to input it yourself:");}
function showDifficultyMenu(){S.phase="DIFFICULTY";println("Choose a difficulty level:");println("1. Easy (12 guesses)");println("2. Medium (8 guesses)");println("3. Hard (5 guesses)");}
function askAgain(){S.phase="AGAIN";println("Would you like to play again? (y/n):");}

function handleInput(raw){
  const val=raw.trim();
  printPromptLine(raw);
  switch(S.phase){
    case"BOOT":
      if(val==="python demo_game.py"||val==="python3 demo_game.py"){blank();welcome();}
      else if(val===""){blank();}
      else{println("-bash: "+val+": command not found");blank();}
      break;
    case"MENU":
      if(val==="1"){S.phase="SEED";println("Please enter a seed:");}
      else if(val==="2"){S.phase="CODE_INPUT";println("Type in the secret code:");}
      else{println("There was a problem processing your input. Please type '1' or '2'.");showCodeMenu();}
      break;
    case"SEED":
      if(!/^\d+$/.test(val)){println("There was a problem processing your input. Please enter a valid integer.");println("Please enter a seed:");}
      else{S.secret=codeFromSeed(parseInt(val,10));showDifficultyMenu();}
      break;
    case"CODE_INPUT":
      if(!/^\d{4}$/.test(val)||new Set(val).size!==4){println("There was a problem processing your input. Please type exactly four unique digits.");println("Type in the secret code:");}
      else{S.secret=val;showDifficultyMenu();}
      break;
    case"DIFFICULTY":{
      const map={"1":12,"2":8,"3":5};
      if(!map[val]){println("There was a problem processing your input. Please type 1, 2, or 3.");showDifficultyMenu();}
      else{S.maxGuesses=map[val];S.guessesLeft=map[val];S.phase="PLAYING";blank();println("Guess the code (type 'give up' if you would like to quit the game):");}
      break;
    }
    case"PLAYING":
      if(val==="give up"){println("You gave up. The code was: "+S.secret);blank();askAgain();}
      else if(!/^\d{4}$/.test(val)||new Set(val).size!==4){println("There was a problem processing your input. Please type exactly four unique digits.");println("Guess the code (type 'give up' if you would like to quit the game):");}
      else{
        let bulls=0,cows=0;
        for(let i=0;i<4;i++){if(val[i]===S.secret[i])bulls++;else if(S.secret.includes(val[i]))cows++;}
        if(bulls===4){println("You win!");blank();askAgain();}
        else{
          println("Bulls: "+bulls);println("Cows: "+cows);S.guessesLeft--;
          if(S.guessesLeft===0){println("You lose; the correct answer was "+S.secret);blank();askAgain();}
          else{println("You have "+S.guessesLeft+" guesses left.");println("Guess the code (type 'give up' if you would like to quit the game):");}
        }
      }
      break;
    case"AGAIN":
      if(val==="y"){blank();showCodeMenu();}
      else{blank();S.phase="DONE";document.getElementById("input-line").style.display="none";const row=document.createElement("span");row.className="row";[["ps1-user","afbeltranp"],["ps1-at","@"],["ps1-host","ubuntu"],["ps1-colon",":"],["ps1-path","~/intro-programacion"],["ps1-dollar","$ "]].forEach(([cls,txt])=>{const s=document.createElement("span");s.className=cls;s.textContent=txt;row.appendChild(s);});hist.appendChild(row);hist.scrollTop=hist.scrollHeight;}
      break;
  }
}
